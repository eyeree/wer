<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Infinite World Exploration</title>
    <link rel="stylesheet" href="./assets/app.css" />
  </head>
  <body class="viewer-page">
    <header class="site-header">
      <a class="brand" href="./">Infinite World Exploration</a>
      <nav aria-label="Site">
        <a href="./">Viewer</a>
        <a href="./docs/world-model.html">World Model</a>
        <a href="./help/">Help</a>
      </nav>
    </header>
    <main class="app-shell" data-view="viewer">
      <section class="viewer">
        <div class="toolbar" aria-label="Viewer controls">
          <div class="toolbar-group" role="group" aria-label="View">
            <span class="toolbar-group-label" aria-hidden="true">View</span>
            <button type="button" data-action="set-presentation" data-value="map" aria-pressed="true">Map</button>
            <button type="button" data-action="set-presentation" data-value="pov" aria-pressed="false">POV</button>
            <button type="button" data-action="set-presentation" data-value="split" aria-pressed="false">Split</button>
          </div>
          <div class="toolbar-group" role="group" aria-label="Map">
            <span class="toolbar-group-label" aria-hidden="true">Map</span>
            <select data-action="set-map-channel" data-generated="map-channels" aria-label="Map channel"></select>
            <div class="map-overlay-controls" data-generated="map-overlays" aria-label="Map overlays"></div>
            <button type="button" data-action="toggle-gpu-compose" aria-pressed="false">Compose</button>
            <button type="button" data-action="toggle-refinement" aria-pressed="false">Refine</button>
          </div>
          <details class="toolbar-group toolbar-disclosure">
            <summary>Exploration</summary>
            <div class="toolbar-disclosure-controls" role="group" aria-label="Exploration">
              <button type="button" data-action="capture-anchor">Capture</button>
              <button type="button" data-action="cycle-capture-category">Category</button>
              <button type="button" data-action="toggle-capture-polarity">Polarity</button>
              <button type="button" data-action="drop-anchor" data-value="emphasize">Emphasize</button>
              <button type="button" data-action="drop-anchor" data-value="suppress">Suppress</button>
              <button type="button" data-action="toggle-transition-mode">Transition</button>
              <button type="button" data-action="clear-anchors">Clear</button>
            </div>
          </details>
          <div class="toolbar-group" role="group" aria-label="Runtime">
            <span class="toolbar-group-label" aria-hidden="true">Runtime</span>
            <select data-action="set-resource-tier" aria-label="Resource tier">
              <option value="low">WebLow</option>
              <option value="mid">WebMid</option>
              <option value="high">WebHigh</option>
            </select>
            <select data-action="set-worker-backend" aria-label="Worker mode">
              <option value="inline">Inline</option>
              <option value="workers">Workers</option>
              <option value="shared-workers">Shared memory</option>
            </select>
          </div>
          <div class="toolbar-group" role="group" aria-label="Storage">
            <span class="toolbar-group-label" aria-hidden="true">Storage</span>
            <button type="button" data-action="save-session">Save</button>
            <button type="button" data-action="request-atlas-export">Export</button>
            <button type="button" data-action="request-atlas-import">Import</button>
            <button type="button" data-action="reset-local-vault">Reset</button>
          </div>
          <div class="toolbar-group" role="group" aria-label="POV">
            <span class="toolbar-group-label" aria-hidden="true">POV</span>
            <button type="button" data-action="toggle-walk" aria-pressed="false">Walk</button>
            <button type="button" data-action="toggle-pov-shadow-ao" aria-pressed="true">Shadows/AO</button>
            <button type="button" data-action="toggle-pov-detail-normals" aria-pressed="true">Detail</button>
            <button type="button" data-action="toggle-pov-water" aria-pressed="true">Water</button>
            <select data-action="set-pov-render-scale" aria-label="POV render scale">
              <option value="1">POV scale 1.0</option>
              <option value="0.5">POV scale 0.5</option>
              <option value="0.25">POV scale 0.25</option>
            </select>
          </div>
        </div>
        <div class="canvas-host">
          <canvas id="world-canvas" data-view-kind="map" tabindex="0" aria-label="World map"></canvas>
          <canvas id="pov-canvas" data-view-kind="pov" tabindex="0" aria-label="GPU map and POV stage" hidden></canvas>
        </div>
        <div class="status-bar" role="status">
          <span data-status-field="wasm-status">Loading wasm</span>
          <span data-status-field="origin-hash">origin hash pending</span>
          <span data-status-field="webgpu-status">WebGPU probing</span>
          <span data-status-field="map-decor-status">Map decor pending</span>
        </div>
      </section>
      <aside class="info-panel" aria-label="World information" data-panel-document aria-busy="true">
        <div class="panel-columns">
          <div class="panel-column" data-panel-column="explorer" role="region" aria-label="Explorer information"></div>
          <div class="panel-column" data-panel-column="world" role="region" aria-label="World information"></div>
          <div class="panel-column" data-panel-column="system" role="region" aria-label="System information"></div>
        </div>
        <details class="platform-diagnostics">
          <summary>Browser diagnostics</summary>
          <pre data-platform-field="diagnostics">initializing browser runtime</pre>
        </details>
      </aside>
    </main>
    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
