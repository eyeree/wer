<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Infinite World Exploration</title>
    <link rel="stylesheet" href="./assets/app.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./">Infinite World Exploration</a>
      <nav aria-label="Site">
        <a href="./">Viewer</a>
        <a href="./docs/world-model.html">World Model</a>
        <a href="./help/">Help</a>
      </nav>
    </header>
    <main class="app-shell" data-view="viewer">
      <section class="viewer">
        <div class="toolbar" aria-label="Viewer controls">
          <select data-command="channel" aria-label="Map channel">
            <option value="composite">Composite</option>
            <option value="elevation">Elevation</option>
            <option value="geology">Geology</option>
            <option value="temperature">Temperature</option>
            <option value="moisture">Moisture</option>
            <option value="river">River</option>
            <option value="wetness">Wetness</option>
            <option value="soil">Soil</option>
            <option value="biome">Biome</option>
            <option value="vegetation">Vegetation</option>
            <option value="herbivore">Herbivore</option>
            <option value="predator">Predator</option>
            <option value="diversity">Diversity</option>
            <option value="species">Species</option>
          </select>
          <button type="button" data-command="toggle:compose" aria-pressed="true">Compose</button>
          <button type="button" data-command="toggle:refinement" aria-pressed="false">Refine</button>
          <select data-command="tier" aria-label="Resource tier">
            <option value="auto">Auto tier</option>
            <option value="low">WebLow</option>
            <option value="mid">WebMid</option>
            <option value="high">WebHigh</option>
          </select>
          <select data-command="worker" aria-label="Worker mode">
            <option value="inline">Inline</option>
            <option value="workers">Workers</option>
            <option value="shared">Shared memory</option>
          </select>
          <button type="button" data-command="storage:save">Save</button>
          <button type="button" data-command="storage:export">Export</button>
          <button type="button" data-command="storage:import">Import</button>
          <button type="button" data-command="storage:reset">Reset</button>
          <button type="button" data-command="mode:map" aria-pressed="true">Map</button>
          <button type="button" data-command="mode:pov" aria-pressed="false">POV</button>
          <button type="button" data-command="pov:walk" aria-pressed="false">Walk</button>
          <button type="button" data-command="pov:toggle-baked" aria-pressed="true">Baked</button>
          <button type="button" data-command="pov:toggle-detail" aria-pressed="true">Detail</button>
          <button type="button" data-command="pov:toggle-water" aria-pressed="true">Water</button>
          <select data-command="pov:scale" aria-label="POV render scale">
            <option value="full">POV scale 1.0</option>
            <option value="half">POV scale 0.5</option>
            <option value="quarter">POV scale 0.25</option>
          </select>
        </div>
        <canvas id="world-canvas" width="960" height="540" tabindex="0" aria-label="World map"></canvas>
        <div class="status-bar" role="status">
          <span data-field="wasm-status">Loading wasm</span>
          <span data-field="origin-hash">origin hash pending</span>
          <span data-field="webgpu-status">WebGPU probing</span>
        </div>
      </section>
      <aside class="info-panel" aria-label="World information">
        <h1>Viewer</h1>
        <dl>
          <dt>Region</dt>
          <dd data-field="region">0, 0</dd>
          <dt>Channel</dt>
          <dd data-field="channel">composite</dd>
          <dt>Tier</dt>
          <dd data-field="tier">auto</dd>
          <dt>Executor</dt>
          <dd data-field="executor">inline</dd>
          <dt>Storage</dt>
          <dd data-field="storage">memory</dd>
          <dt>Cursor</dt>
          <dd data-field="cursor">none</dd>
          <dt>View</dt>
          <dd data-field="view">map</dd>
        </dl>
        <pre data-field="diagnostics">initializing browser runtime</pre>
      </aside>
    </main>
    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
