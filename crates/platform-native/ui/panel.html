<!doctype html>
<!-- Native overlay information panel (wry-overlay plan M2). The dock markup
     is the browser shell's, verbatim (crates/platform-web/web/index.html);
     the shared ui/panel-dock.js binds the same PanelDocument with the same
     stable field nodes and resizable columns. The viewer/panel row resizer is
     absent by design: on native that split is window geometry (M4). -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>World information</title>
    <link rel="stylesheet" href="../assets/app.css" />
    <link rel="stylesheet" href="./overlay.css" />
  </head>
  <body class="viewer-page overlay-page">
    <aside
      id="information-panel"
      class="info-panel"
      aria-label="World information"
      data-panel-document
      aria-busy="true"
    >
      <div class="panel-columns">
        <div
          id="panel-column-explorer"
          class="panel-column"
          data-panel-column="explorer"
          role="region"
          aria-label="Explorer information"
        ></div>
        <div
          class="panel-resizer"
          data-panel-resizer="0"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize Explorer and Inspection panels"
          aria-controls="panel-column-explorer panel-column-inspection"
          aria-valuemin="0"
          aria-valuemax="100"
          tabindex="0"
        ></div>
        <div
          id="panel-column-inspection"
          class="panel-column"
          data-panel-column="inspection"
          role="region"
          aria-label="Inspection information"
        ></div>
        <div
          class="panel-resizer"
          data-panel-resizer="1"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize Inspection and World panels"
          aria-controls="panel-column-inspection panel-column-world"
          aria-valuemin="0"
          aria-valuemax="100"
          tabindex="0"
        ></div>
        <div
          id="panel-column-world"
          class="panel-column"
          data-panel-column="world"
          role="region"
          aria-label="World information"
        ></div>
        <div
          class="panel-resizer"
          data-panel-resizer="2"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize World and Ecology panels"
          aria-controls="panel-column-world panel-column-ecology"
          aria-valuemin="0"
          aria-valuemax="100"
          tabindex="0"
        ></div>
        <div
          id="panel-column-ecology"
          class="panel-column"
          data-panel-column="ecology"
          role="region"
          aria-label="Ecology information"
        ></div>
        <div
          class="panel-resizer"
          data-panel-resizer="3"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize Ecology and System panels"
          aria-controls="panel-column-ecology panel-column-system"
          aria-valuemin="0"
          aria-valuemax="100"
          tabindex="0"
        ></div>
        <div
          id="panel-column-system"
          class="panel-column"
          data-panel-column="system"
          role="region"
          aria-label="System information"
        ></div>
      </div>
      <details class="platform-diagnostics">
        <summary>Native diagnostics</summary>
        <pre data-platform-field="diagnostics">initializing native overlay</pre>
      </details>
    </aside>
    <script type="module" src="./panel.js"></script>
  </body>
</html>
