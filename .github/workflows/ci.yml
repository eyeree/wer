name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  XWIN_CACHE_DIR: ${{ github.workspace }}/target/xwin-cache

jobs:
  # Native: format, lint, build, and run the determinism/unit tests.
  native:
    name: native (check, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          rustup show active-toolchain || rustup toolchain install stable
          rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets
      - name: check
        run: cargo check --workspace
      - name: test
        run: cargo test --workspace

  # Browser portability plus executed parity: neutral crates compile for wasm,
  # then every deterministic probe runs in Node (ADR 0027).
  wasm:
    name: wasm32 check + parity test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain + target
        run: |
          rustup show active-toolchain || rustup toolchain install stable
          rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install pinned wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - name: Install pinned wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked
      - name: check world-core (wasm32)
        run: cargo check -p world-core --target wasm32-unknown-unknown
      - name: check world-runtime (wasm32)
        run: cargo check -p world-runtime --target wasm32-unknown-unknown
      - name: check viewer-host (wasm32)
        run: cargo check -p viewer-host --target wasm32-unknown-unknown
      - name: check platform-web (wasm32)
        run: cargo check -p platform-web --target wasm32-unknown-unknown
      - name: execute parity probes in Node
        run: wasm-pack test --node crates/platform-web
      - name: build static browser artifact
        run: cargo run --bin web-build
      - name: static browser smoke
        run: node crates/platform-web/web/smoke.mjs target/web-dist
      - name: upload static browser artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: target/web-dist

  pages:
    name: publish GitHub Pages
    runs-on: ubuntu-latest
    needs: [native, wasm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download static browser artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: target/web-dist
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/web-dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Windows desktop build from Linux: use the MSVC ABI through cargo-xwin
  # instead of the MinGW/GNU target, so the generated executable matches the
  # native Windows Rust tier used by wgpu/winit users.
  windows:
    name: windows x64 MSVC exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain + target
        run: |
          rustup show active-toolchain || rustup toolchain install stable
          rustup target add x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Install LLVM linker toolchain
        run: sudo apt-get update && sudo apt-get install -y clang lld llvm
      - name: Install cargo-xwin
        run: cargo install cargo-xwin --version 0.23.0 --locked
      - name: Build wer.exe
        run: cargo xwin build --release --bin wer --target x86_64-pc-windows-msvc
      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: wer-windows-x86_64-msvc
          path: target/x86_64-pc-windows-msvc/release/wer.exe

  release:
    name: publish Windows release
    runs-on: ubuntu-latest
    needs: [native, wasm, windows]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download Windows executable
        uses: actions/download-artifact@v4
        with:
          name: wer-windows-x86_64-msvc
          path: release-assets
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: main-${{ github.sha }}
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          RELEASE_TITLE="wer ${SHORT_SHA}"
          RELEASE_NOTES="Automated Windows build for commit ${GITHUB_SHA}."
          if ! gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release create "${TAG_NAME}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TITLE}" \
              --notes "${RELEASE_NOTES}"
          fi
          gh release upload "${TAG_NAME}" \
            release-assets/wer.exe#wer-windows-x86_64-msvc.exe \
            --clobber
